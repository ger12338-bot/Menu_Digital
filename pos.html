<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro | Tacos & Papas Asadas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================
           1. ESTILOS BASE Y GENERALES DE LA TERMINAL
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #060606;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e0e0e0;
            padding-bottom: 20px;
        }

        /* Contenedor Principal POS */
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* Header POS */
        .pos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pos-header h1 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .pos-header p {
            color: #666;
            font-size: 0.85rem;
        }

        /* Barra de búsqueda */
        .search-container {
            position: relative;
            margin-bottom: 15px;
            width: 100%;
        }

        .search-container i.fa-magnifying-glass {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff5500;
            font-size: 1.1rem;
        }

        .search-bar {
            width: 100%;
            background: #121212;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 14px 45px;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            border-color: #ff5500;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.2);
            outline: none;
        }

        .clear-search-btn {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
            transition: color 0.2s;
        }

        .clear-search-btn:hover { color: #ff3344; }

        /* Categorías */
        .categories-nav {
            display: flex;
            gap: 10px;
            padding: 5px 0 15px 0;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .categories-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            background: #121212;
            color: #9e9e9e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            transition: all 0.25s ease;
            user-select: none;
            flex-shrink: 0;
        }

        .category-btn:hover {
            color: #fff;
            border-color: rgba(255, 85, 0, 0.5);
            background: #161616;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #ff5500, #ff8c00);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(255, 85, 0, 0.3);
        }

        /* Catálogo de Productos Grid */
        .pos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .pos-card {
            background: #121212;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 110px;
            user-select: none;
            cursor: pointer;
        }

        .pos-card:hover {
            border-color: #ff5500;
            transform: translateY(-2px);
        }

        .pos-card:active {
            transform: scale(0.97);
            border-color: #25d366;
        }

        .pos-card h3 {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .pos-card .price {
            color: #ff944d;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .pos-card-agotado {
            opacity: 0.4;
            cursor: not-allowed !important;
            border-color: rgba(255, 51, 68, 0.2) !important;
        }

        .pos-badge-agotado {
            color: #ff3344;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .flash-effect { animation: cardFlash 0.35s ease-out; }
        @keyframes cardFlash {
            0% { background: #121212; }
            30% { background: rgba(255, 85, 0, 0.2); border-color: #ff5500; }
            100% { background: #121212; }
        }

        /* Panel Lateral del Ticket */
        .pos-sidebar {
            background: #111111;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.04);
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .ticket-list {
            flex: 1;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            margin: 12px 0;
            padding-right: 5px;
        }

        .ticket-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            animation: rowSlideIn 0.2s ease-out;
        }

        @keyframes rowSlideIn {
            from { opacity: 0; transform: translateX(15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .ticket-controls { 
            display: flex;
            align-items: center;
            background: #161616;
            padding: 4px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.04);
            gap: 6px;
        }

        .ticket-btn {
            background: #252525;
            border: none;
            color: #fff;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .ticket-btn:hover { background: #ff5500; color: #fff; }

        /* Formulario de Pago */
        .fast-cash-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 12px;
        }

        .cash-pill {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.04);
            color: #e0e0e0;
            padding: 8px 2px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .cash-pill:hover {
            background: #ff5500;
            color: #fff;
        }

        .pos-input {
            width: 100%;
            background: #161616;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .pos-input:focus { border-color: #ff5500; outline: none; }

        .calc-box {
            background: #161616;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .change-alert {
            color: #25D366;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .submit-order-btn {
            width: 100%;
            color: #fff;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ==========================================
           2. REGLAS RESPONSIVAS (MÓVILES Y TABLETS)
           ========================================== */
        @media (max-width: 1024px) {
            .pos-container {
                grid-template-columns: 1fr;
            }

            .pos-sidebar {
                position: relative;
                top: 0;
                max-height: none;
                margin-top: 15px;
            }
        }

        @media (max-width: 600px) {
            .pos-container { padding: 10px; }
            .pos-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .pos-card { padding: 12px; min-height: 100px; }
            .pos-card h3 { font-size: 0.85rem; }
            .pos-card .price { font-size: 1rem; }
            .fast-cash-container { grid-template-columns: repeat(5, 1fr); }
            .cash-pill { padding: 10px 0; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="pos-container">
        <!-- ÁREA IZQUIERDA: MENÚ Y FILTROS -->
        <div>
            <div class="pos-header">
                <div>
                    <h1>PUNTO DE VENTA</h1>
                    <p>Tacos & Papas Asadas Sucursal Pilares</p>
                </div>
            </div>

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="posSearch" class="search-bar" placeholder="Buscar platillo..." oninput="buscarProducto()">
                <button id="clearSearchBtn" class="clear-search-btn" onclick="limpiarBuscador()"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            
            <nav class="categories-nav" id="categoriesNav">
                <!-- Carga dinámica -->
            </nav>

            <div class="pos-grid" id="menuContainer">
                <!-- Carga dinámica -->
            </div>
        </div>

        <!-- ÁREA DERECHA: NOTA DE VENTA Y TICKET -->
        <div class="pos-sidebar">
            <h2 style="font-size: 1.1rem; color: #fff; margin-bottom: 5px; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-receipt" style="color: #ff5500;"></i> Detalle del Ticket
            </h2>
            
            <div id="posItemsList" class="ticket-list">
                <!-- Carga dinámica -->
            </div>

            <!-- APARTADO DE IMPORTES -->
            <div style="background: #161616; padding: 14px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 0.85rem; color: #9e9e9e; font-weight: 600;">TOTAL NETO</span>
                <strong id="posTotal" style="font-size: 1.6rem; color: #ff5500;">$0.00</strong>
            </div>

            <!-- SECCIÓN DE LIQUIDACIÓN -->
            <div style="background: rgba(255,255,255,0.01); padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03);">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label style="color: #666; font-size: 0.75rem; display: block; margin-bottom: 4px; font-weight: 600;">FORMA PAGO</label>
                        <select id="posPaymentMethod" class="pos-input" onchange="alternarCamposEfectivo()">
                            <option value="Efectivo">💵 Efectivo</option>
                            <option value="Tarjeta">💳 Tarjeta</option>
                            <option value="Transferencia">📲 SPEI</option>
                        </select>
                    </div>
                    <div id="efectivoInputControl">
                        <label style="color: #666; font-size: 0.75rem; display: block; margin-bottom: 4px; font-weight: 600;">PAGA CON</label>
                        <input type="number" id="pagaCon" class="pos-input" placeholder="0.00" step="any" oninput="calcularCambio()">
                    </div>
                </div>

                <!-- Billetes Rápidos -->
                <div id="fastCashSection" class="fast-cash-container">
                    <div class="cash-pill" onclick="rapidoEfectivo(20)">$20</div>
                    <div class="cash-pill" onclick="rapidoEfectivo(50)">$50</div>
                    <div class="cash-pill" onclick="rapidoEfectivo(100)">$100</div>
                    <div class="cash-pill" onclick="rapidoEfectivo(200)">$200</div>
                    <div class="cash-pill" onclick="rapidoEfectivo(500)">$500</div>
                </div>

                <div id="efectivoSection" class="calc-box">
                    <span style="color: #9e9e9e; font-size: 0.8rem; font-weight: 600;">CAMBIO:</span>
                    <span id="cambioAEntregar" class="change-alert">$0.00</span>
                </div>

                <input type="text" id="posNotes" class="pos-input" placeholder="Cliente / Ref. (Opcional)">

                <button type="button" id="btnRegistrarVenta" class="submit-order-btn" style="background: linear-gradient(135deg, #ff5500, #ff8c00); border-radius: 12px; padding: 14px; transition: all 0.3s;" onclick="procesarVentaPOS()">
                    <i class="fa-solid fa-bolt"></i> Registrar Venta
                </button>
            </div>
        </div>
    </div>

    <script src="pos.js"></script>
</body>
</html>
