<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro | Tacos & Papas Asadas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CONTENEDOR PRINCIPAL POS */
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 440px;
            gap: 30px;
            max-width: 1500px;
            margin: 0 auto;
            padding: 25px;
        }
        @media (max-width: 1050px) { 
            .pos-container { grid-template-columns: 1fr; } 
        }

        /* BARRA DE BÚSQUEDA INTERACTIVA */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        .search-container i.fa-magnifying-glass {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%); color: #ff5500; font-size: 1.2rem;
        }
        .search-bar {
            width: 100%; background: #121212; border: 1px solid rgba(255,255,255,0.06);
            padding: 16px 50px 16px 50px; border-radius: 16px; color: white; font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .search-bar:focus {
            border-color: #ff5500; box-shadow: 0 0 15px rgba(255, 85, 0, 0.2); outline: none;
        }
        .clear-search-btn {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #666; cursor: pointer; font-size: 1.1rem;
            display: none; transition: color 0.2s;
        }
        .clear-search-btn:hover { color: #ff3344; }

        /* CONTENEDOR DE CATEGORÍAS PREMIUM (SIN ICONOS) */
        .categories-nav {
            display: flex;
            gap: 10px;
            padding: 10px 0 20px 0;
            overflow-x: auto;
            white-space: nowrap;
            background: transparent;
            border: none;
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        /* BOTONES DE CATEGORÍA INTERACTIVOS EN PÍLDORA */
        .category-btn {
            background: #121212;
            color: #9e9e9e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 26px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        .category-btn:hover {
            color: #fff;
            border-color: rgba(255, 85, 0, 0.5);
            background: #161616;
            transform: translateY(-2px);
        }
        .category-btn.active {
            background: linear-gradient(135deg, #ff5500, #ff8c00);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 6px 15px rgba(255, 85, 0, 0.35);
            transform: translateY(-2px) scale(1.02);
        }

        /* REJILLA DE PRODUCTOS TERMINAL */
        .pos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .pos-card {
            background: #121212; border: 1px solid rgba(255,255,255,0.03);
            border-radius: 18px; padding: 20px; text-align: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: space-between; height: 120px;
            user-select: none;
        }
        .pos-card:hover {
            transform: translateY(-4px); border-color: #ff5500;
            box-shadow: 0 8px 20px rgba(255, 85, 0, 0.15);
        }
        .pos-card:active {
            transform: scale(0.96); border-color: #25d366;
        }
        .pos-card h3 { font-size: 1.1rem; color: #fff; font-weight: 600; margin-bottom: 5px; }
        .pos-card .price { color: #ff944d; font-weight: 800; font-size: 1.2rem; }

        /* ANIMACIÓN PARA TARJETAS PULSADAS */
        .flash-effect {
            animation: cardFlash 0.35s ease-out;
        }
        @keyframes cardFlash {
            0% { background: #121212; }
            30% { background: rgba(255, 85, 0, 0.2); border-color: #ff5500; }
            100% { background: #121212; }
        }

        /* PANEL LATERAL DE TICKET */
        .pos-sidebar {
            background: #111111; border-radius: 28px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.04); position: sticky; top: 25px;
            height: calc(100vh - 50px); min-height: 680px; display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .ticket-list { flex: 1; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        
        /* FILAS DEL TICKET CON ANIMACIÓN */
        .ticket-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
            animation: rowSlideIn 0.25s ease-out;
        }
        @keyframes rowSlideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .ticket-controls { 
            display: flex; align-items: center; background: #161616; 
            padding: 4px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.04); gap: 6px;
        }
        .ticket-btn {
            background: #252525; border: none; color: #fff; border-radius: 50%;
            width: 26px; height: 26px; cursor: pointer; font-weight: bold; display: flex;
            align-items: center; justify-content: center; font-size: 0.9rem; transition: background 0.2s;
        }
        .ticket-btn:hover { background: #ff5500; color: #fff; }

        /* CALCULADORA DE ATAJOS EFECTIVO ($20 A $500) */
        .fast-cash-container {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 14px;
        }
        .cash-pill {
            background: #1a1a1a; border: 1px solid rgba(255,255,255,0.04); color: #e0e0e0;
            padding: 10px 4px; border-radius: 12px; font-weight: 700; cursor: pointer; text-align: center;
            font-size: 0.88rem; transition: all 0.2s ease;
        }
        .cash-pill:hover { background: #ff5500; color: #fff; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(255,85,0,0.2); }
        .cash-pill:active { transform: translateY(0); }

        .pos-input {
            width: 100%; background: #161616; border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 15px; border-radius: 12px; color: white; font-size: 1.1rem; margin-bottom: 12px;
        }
        .pos-input:focus { border-color: #ff5500; outline: none; }
        
        .calc-box {
            background: #161616; padding: 14px; border-radius: 12px;
            margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;
        }
        .change-alert { color: #25D366; font-weight: 800; font-size: 1.4rem; transition: color 0.2s; }
    </style>
</head>
<body style="padding-bottom: 0; background: #060606;">

    <div class="pos-container">
        <!-- ÁREA IZQUIERDA: MENÚ Y FILTROS -->
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h1 style="color: #fff; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px;">PUNTO DE VENTA</h1>
                    <p style="color: #666; font-size: 0.9rem;">Tacos & Papas Asadas Sucursal Pilares</p>
                </div>
            </div>

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="posSearch" class="search-bar" placeholder="Buscar platillo rápidamente..." oninput="buscarProducto()">
                <button id="clearSearchBtn" class="clear-search-btn" onclick="limpiarBuscador()"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            
            <nav class="categories-nav" id="categoriesNav">
                <!-- Dinámico sin iconos -->
            </nav>

            <div class="pos-grid" id="menuContainer">
                <!-- Dinámico -->
            </div>
        </div>

        <!-- ÁREA DERECHA: NOTA DE VENTA -->
        <div class="pos-sidebar">
            <h2 style="font-size: 1.2rem; color: #fff; margin-bottom: 5px; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-receipt" style="color: #ff5500;"></i> Detalle del Ticket
            </h2>
            
            <div id="posItemsList" class="ticket-list">
                <!-- Dinámico -->
            </div>

            <!-- APARTADO DE IMPORTES -->
            <div class="modal-total-container" style="background: #161616; padding: 18px; border-radius: 20px; margin-bottom: 15px;">
                <span style="font-size: 0.9rem; color: #9e9e9e; font-weight: 600;">TOTAL NETO A COBRAR</span>
                <strong id="posTotal" style="font-size: 1.8rem; color: #ff5500;">$0.00</strong>
            </div>

            <!-- SECCIÓN DE LIQUIDACIÓN -->
            <div style="background: rgba(255,255,255,0.01); padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03);">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div>
                        <label style="color: #666; font-size: 0.8rem; display: block; margin-bottom: 5px; font-weight: 600;">FORMA DE PAGO</label>
                        <select id="posPaymentMethod" class="pos-input" onchange="alternarCamposEfectivo()">
                            <option value="Efectivo">💵 Efectivo</option>
                            <option value="Tarjeta">💳 Tarjeta</option>
                            <option value="Transferencia">📲 SPEI / Transf.</option>
                        </select>
                    </div>
                    <div id="efectivoInputControl">
                        <label style="color: #666; font-size: 0.8rem; display: block; margin-bottom: 5px; font-weight: 600;">PAGA CON</label>
                        <input type="number" id="pagaCon" class="pos-input" placeholder="0.00" step="any" oninput="calcularCambio()">
                    </div>
                </div>

                <!-- Atajos de Billetes Rápidos Incluyendo $20 y $50 -->
                <div id="fastCashSection" class="fast-cash-container">
                    <div class="cash-pill" onclick="快捷Efectivo(20)">$20</div>
                    <div class="cash-pill" onclick="快捷Efectivo(50)">$50</div>
                    <div class="cash-pill" onclick="快捷Efectivo(100)">$100</div>
                    <div class="cash-pill" onclick="快捷Efectivo(200)">$200</div>
                    <div class="cash-pill" onclick="快捷Efectivo(500)">$500</div>
                </div>

                <div id="efectivoSection" class="calc-box" style="margin-bottom: 12px; background: #161616;">
                    <span style="color: #9e9e9e; font-size: 0.85rem; font-weight: 600;">CAMBIO CORRESPONDIENTE:</span>
                    <span id="cambioAEntregar" class="change-alert">$0.00</span>
                </div>

                <input type="text" id="posNotes" class="pos-input" placeholder="Referencia / Nombre de cliente (Opcional)">

                <button type="button" id="btnRegistrarVenta" class="submit-order-btn" style="background: linear-gradient(135deg, #ff5500, #ff8c00); border-radius: 14px; padding: 15px; transition: all 0.3s;" onclick="procesarVentaPOS()">
                    <i class="fa-solid fa-bolt"></i> Completar Registro de Venta
                </button>
            </div>
        </div>
    </div>

    <script src="pos.js"></script>
</body>
</html>
