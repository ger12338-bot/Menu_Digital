<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Admin | Caja Tacos & Papas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        @media (max-width: 950px) { .pos-container { grid-template-columns: 1fr; } }
        .search-bar {
            width: 100%; background: #121212; border: 1px solid rgba(255,255,255,0.08);
            padding: 16px; border-radius: 16px; color: white; font-size: 1.1rem; margin-bottom: 20px;
        }
        .pos-sidebar {
            background: #121212; border-radius: 24px; padding: 24px;
            border: 1px solid rgba(255,255,255,0.05); position: sticky; top: 20px; height: fit-content;
        }
        .pos-input {
            width: 100%; background: #161616; border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px; border-radius: 12px; color: white; font-size: 1.05rem; margin-bottom: 14px;
        }
        .pos-input:focus { border-color: #ff5500; outline: none; }
        .calc-box {
            background: #161616; padding: 14px; border-radius: 12px;
            margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;
        }
        .change-alert { color: #25D366; font-weight: 800; font-size: 1.3rem; }
    </style>
</head>
<body style="padding-bottom: 40px;">

    <header style="padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;">
        <h1 style="color: #ff5500; font-size: 2rem;"><i class="fa-solid fa-cash-register"></i> PUNTO DE VENTA (POS)</h1>
        <p style="color: #9e9e9e;">Consola de Caja Registradora para Sucursal</p>
    </header>

    <div class="pos-container">
        <!-- SECCIÓN DE PRODUCTOS -->
        <div>
            <input type="text" id="posSearch" class="search-bar" placeholder="🔍 Filtrar menú por nombre del platillo..." oninput="buscarProducto()">
            
            <!-- LAS CATEGORÍAS EN CAJA TAMBIÉN SE CREAN SOLAS LEYENDO TU GOOGLE SHEET -->
            <nav class="categories-nav" id="categoriesNav" style="position: static; margin-bottom: 25px; padding: 5px 0;">
            </nav>

            <div class="menu-container" id="menuContainer" style="padding: 0; gap: 15px;">
                <!-- Cargando dinámicamente -->
            </div>
        </div>

        <!-- MÓDULO DE COBRO -->
        <div class="pos-sidebar">
            <h2 style="font-size: 1.3rem; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px;">
                <i class="fa-solid fa-receipt"></i> Ticket Actual
            </h2>
            
            <div id="posItemsList" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;">
                <p style="color: #555; text-align: center; padding: 20px;">La cuenta está vacía.</p>
            </div>

            <div class="modal-total-container" style="padding: 14px; margin-bottom: 15px;">
                <span>TOTAL NETO:</span>
                <strong id="posTotal" style="font-size: 1.6rem; color: #ff5500;">$0.00</strong>
            </div>

            <div style="background: rgba(255,255,255,0.01); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03);">
                <label style="color: #9e9e9e; font-size: 0.85rem; display: block; margin-bottom: 5px;">Método de Pago:</label>
                <select id="posPaymentMethod" class="pos-input" onchange="alternarCamposEfectivo()">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Transferencia">Transferencia</option>
                </select>

                <div id="efectivoSection">
                    <label style="color: #9e9e9e; font-size: 0.85rem; display: block; margin-bottom: 5px;">Efectivo Recibido:</label>
                    <input type="number" id="pagaCon" class="pos-input" placeholder="$0.00" step="any" oninput="calcularCambio()">

                    <div class="calc-box">
                        <span style="color: #9e9e9e; font-size: 0.9rem;">CAMBIO AL CLIENTE:</span>
                        <span id="cambioAEntregar" class="change-alert">$0.00</span>
                    </div>
                </div>

                <label style="color: #9e9e9e; font-size: 0.85rem; display: block; margin-bottom: 5px;">Nombre de cliente o Mesa (Opcional):</label>
                <input type="text" id="posNotes" class="pos-input" placeholder="Ej. Mesa 4, Llevar cambio...">

                <button type="button" id="btnRegistrarVenta" class="submit-order-btn" style="background: linear-gradient(135deg, #ff5500, #ff8c00);" onclick="procesarVentaPOS()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Guardar Venta en Caja
                </button>
            </div>
        </div>
    </div>

    <script src="pos.js"></script>
</body>
</html>
